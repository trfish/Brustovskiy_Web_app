<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход</title>
    <style>
        body{font-family:system-ui,Arial,sans-serif;background:#0f172a;
             display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
        .card{background:#1e293b;color:#e2e8f0;padding:36px 40px;border-radius:16px;
              width:320px;box-shadow:0 10px 40px rgba(0,0,0,.4);}
        h1{margin:0 0 20px;font-size:24px;text-align:center;}
        label{display:block;margin:14px 0 6px;font-size:14px;}
        input{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;
              border:1px solid #334155;background:#0f172a;color:#e2e8f0;}
        button{width:100%;margin-top:22px;padding:11px;border:0;border-radius:8px;
               background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;}
        .err{color:#f87171;font-size:14px;margin-top:14px;text-align:center;}
        .link{display:block;margin-top:16px;text-align:center;color:#93c5fd;font-size:14px;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Вход</h1>
        <form method="POST" action="/login">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" autocomplete="off">

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password">

            <button type="submit">Войти</button>
        </form>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        <a class="link" href="/register">Нет аккаунта? Зарегистрироваться</a>
    </div>
</body>
</html>
